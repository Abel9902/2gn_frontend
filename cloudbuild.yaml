steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA
      - --build-arg
      - VUE_APP_API_BASE=${_VUE_APP_API_BASE}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - "8080"
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA

substitutions:
  _SERVICE_NAME: 2gn-frontend
  _REGION: us-central1
  _IMAGE_NAME: 2gn-frontend
  _VUE_APP_API_BASE: https://api.2gnconstruction.com
